<!DOCTYPE html>
<html>
<head>
    <title>Edit Attendance</title>

    <style>
        body{
            margin:0;
            font-family: Arial;
            background:#2c2f34;
        }

        /* CENTER BOX */
        .box{
            width:420px;
            margin:80px auto;
            background:rgb(255, 255, 255);
            padding:25px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:20px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:14px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#555;
        }
    </style>

</head>

<body>

<div class="box">

    <h2> Edit Attendance</h2>

    <form action="/update_attendance/{{ data[0] }}" method="POST">

        <label>Student Name</label>
        <input type="text" name="student_name" value="{{ data[1] }}">

        <label>Date</label>
        <input type="text" name="date" value="{{ data[2] }}">

        <label>Status</label>
        <input type="text" name="status" value="{{ data[3] }}">

        <button type="submit">Update Attendance</button>

    </form>

    <a class="back" href="/report">← Back to Report</a>

</div>

</body>
</html>
