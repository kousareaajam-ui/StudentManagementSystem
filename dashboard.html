<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body{
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #1e1e2f;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px;
            text-decoration: none;
            margin: 5px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #4CAF50;
        }

        /* Main */
        .main {
            margin-left: 240px;
            padding: 20px;
        }

        /* Cards */
        .card {
            display: inline-block;
            width: 250px;
            background: white;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .title {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .number {
            font-size: 30px;
            color: #4CAF50;
        }
    </style>
</head>

<body>
<!-- SIDEBAR -->
<div class="sidebar">
    <a href="/dashboard">Dashboard</a>
    <a href="/students">Students</a>
    <a href="/attendance">Attendance</a>
    <a href="/marks">Marks</a>
    <a href="/report">Report</a>
    <a href="/marks_report"> Marks Report</a>
    <a href="/logout">Logout</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <h1>Admin Dashboard</h1>

    <!-- CARDS -->
    <div class="card">
        <div class="title">Total Students</div>
        <div class="number">{{ total_students }}</div>
    </div>

    <div class="card">
        <div class="title">System Status</div>
        <div class="number">Active</div>
    </div>

</div>

</body>
</html>
