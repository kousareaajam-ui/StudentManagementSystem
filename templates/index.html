
<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>

    <style>

        body{
            font-family: Arial;
            width: 500px;
            margin: auto;
            margin-top: 50px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            padding:10px 20px;
            margin-top:10px;
        }

    </style>

</head>
<body>
<h1>Add Student</h1>

<form action="/add" method="POST">

    <input
        type="text"
        name="name"
        placeholder="Student Name"
        required>

    <input
        type="enrollment"
        name="enrollment"
        placeholder="Enrollment Number"
        required>

    <input
        type="text"
        name="course"
        placeholder="Course"
        required>

    <button type="submit">
        Save Student
    </button>

</form>

<br>

<a href="/students">
    View Students
</a>

</body>
</html>
