
<!DOCTYPE html>
<html>
<head>

<title>Student List</title>

<style>

body{
    font-family: Arial;
    margin:40px;
}

table{
    border-collapse: collapse;
    width:100%;
}

th,td{
    border:1px solid black;
    padding:10px;
}

</style>

</head>

<body>
<h1 style="text-align: center;">Student List</h1>
<form action="/search" method="GET">

    <input
        type="text"
        name="keyword"
        placeholder="Search Student Name">

    <button type="submit">
        Search
    </button>

</form>

<br>

<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Enrollment</th>
    <th>Course</th>
    <th>Action</th>
</tr>

{% for student in students %}

<tr>
    <td>{{ loop.index }}</td>
    <td>{{ student[1] }}</td>
    <td>{{ student[2] }}</td>
    <td>{{ student[3] }}</td>
    <td><a href="/edit/{{ student[0] }}">
    Edit
</a>
|
    <a href="/delete/{{ student[0] }}">
        Delete
    </a>
</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">Add Student</a>

</body>
</html>
