<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <style>
        body{
            margin:0;
            font-family: Arial;
            background:#f4f6f9;
        }

        /* TOP BAR */
        .topbar{
            background:#1e1e2f;
            color:white;
            padding:12px;
            text-align:right;
        }

        .topbar a{
            color:white;
            text-decoration:none;
            margin-left:15px;
            font-weight:bold;
        }

        /* CARD FORM */
        .card{
            width:400px;
            margin:80px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        label{
            font-weight:bold;
            display:block;
            margin-top:10px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#45a049;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <a href="/dashboard">Home</a>
    <a href="javascript:history.back()">Back</a>
</div>

<!-- FORM -->
<div class="card">

    <h2>Edit Student</h2>

    <form action="/update/{{ student[0] }}" method="POST">

        <label>Name</label>
        <input type="text" name="name" value="{{ student[1] }}">

        <label>Enrollment</label>
        <input type="text" name="enrollment" value="{{ student[2] }}">

        <label>Course</label>
        <input type="text" name="course" value="{{ student[3] }}">

        <button type="submit">Update Student</button>

    </form>

</div>

</body>
</html>
